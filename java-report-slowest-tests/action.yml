# SPDX-License-Identifier: Apache-2.0
---
name: 'java-report-slowest-tests'
description: 'Reports the N slowest JUnit test classes to the GitHub job summary'

inputs:
  count:
    description: 'Number of slowest test classes to report'
    required: false
    default: '10'
  artifact_pattern:
    description: 'Artifact name pattern to download test results from'
    required: false
    default: 'unit-test-results'
  runner:
    description: 'Runner label to include in the report heading'
    required: false
    default: ''

runs:
  using: "composite"
  steps:
    - name: Download test results
      uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
      with:
        pattern: ${{ inputs.artifact_pattern }}
        merge-multiple: true

    - name: Report slowest tests
      shell: bash
      run: python3 ${{ github.action_path }}/report_slowest_tests.py ${{ inputs.count }} ${{ inputs.runner }}
