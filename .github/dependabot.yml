version: 2

updates:
  # GitHub Actions updates
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
    groups:
      actions:
        patterns:
          - "actions/*"
      aws-actions:
        patterns:
          - "aws-actions/*"
      other-actions:
        patterns:
          - "*"
        exclude-patterns:
          - "actions/*"
          - "aws-actions/*"      
    cooldown:
      default-days: 7
    open-pull-requests-limit: 5
    labels:
      - "dependencies"      