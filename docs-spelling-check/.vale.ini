# Vale configuration
# See vale_styles/README.md file for details and licensing information

# Styles directory for all packages and config (vocab) files

StylesPath = ./styles

# Packages to sync with. Remember never adapt the external packages, all changes will be lost on update

Packages = Microsoft, proselint, write-good

Vocab = Consensys-common

# The minimum alert level to display (suggestion, warning, or error).
# Builds not set to fail too many false positives
MinAlertLevel = warning

# Skip YAML/TOML/JSON front matter, img alt text, and default inline ignores. See Vale Front Matter / Scopes docs.
IgnoredScopes = code, tt, frontmatter, alt

# Treat .mdx files as Markdown so Vale can apply Markdown rules and styles.
# This does NOT automatically make Vale lint .mdx files; it only defines
# how .mdx files are parsed once they are matched by a glob below.

[formats]
mdx = md

# Apply Markdown linting rules to both .md and .mdx files.
# Note: Vale only runs rules on files that match a section glob.
# Including .mdx here is required; the [formats] mapping alone is not sufficient.
# Global settings (applied to every syntax)

[*.{md,mdx}]

# ignore includes and latex math code
TokenIgnores = ({![^!}]+!}),\
  (\$[^\n$`]+\$),\
  (\$\$[^$`]+\$\$),\
  ({%[^}]+%}),\
  ({{[^}]+}}),\
  (\+\+[A-Za-z]+\+[A-Za-z0-9]+\+\+),\
  (:[a-z\-]+:),\
  (^\s*import\s.+\s+from\s+.+$),\
  (^\s*export\s.+$),\
  (^\s*<img\b.*$),\
  (^\s*style=\{\{.*\}\}.*$),\
  (^\s*src=\{.*\}.*$),\
  (^\s*\/>\s*$),\
  (\bPolyfill\b)

# Ignore MDX import/export lines (React code)
# Ignore CardList (and similar) MDX blocks â€” props/JS literals are not prose; Vale would otherwise
# flag terminology inside title/description strings.
BlockIgnores = (?m)^\s*import\s+[^\n]*$,\
  (?m)^\s*export\s+[^\n]*$,\
  (?s)<CardList\b[\s\S]*?/>

# List of styles to load

BasedOnStyles = Consensys, Vale, Microsoft, proselint, write-good

# Allows Consensys Headings to take precedence
Microsoft.Headings = NO

# Allows using first-person plural like 'We'
Microsoft.We = NO

# Allows using acronyms in headings
Microsoft.HeadingAcronyms = NO

# Microsoft.Acronyms is replaced by Consensys list
Microsoft.Acronyms = NO

Microsoft.Auto = NO

# Microsoft.Avoid is not relevant
Microsoft.Avoid = NO

# Allows Consensys.EmDash to take precedence
Microsoft.Dashes = NO

Microsoft.Negative = NO

# Quiet quotes: too many false positives
Microsoft.Quotes = NO

# Quiet contractions: too many positives
Microsoft.Contractions = NO

# Microsoft.GeneralURL is not relevant
Microsoft.GeneralURL = NO

# Allows Microsoft.Adverbs to take precedence
Microsoft.Very = NO

# Replaced by Consensys.Terms (custom term preferences)
Microsoft.Terms = NO

# Allows proselint.Cliches to take precedence
write-good.Cliches = NO

# Quiet weasel: is replaced by Consensys list
write-good.Weasel = NO

# Quiet E-Prime: too many false positives
write-good.E-Prime = NO

# Allows Vale.Repetition to take precedence
write-good.Illusions = NO

# Quiet too wordy: too many false positives
write-good.TooWordy = NO

# Allows Microsoft passive to take precedence
write-good.Passive = NO

write-good.So = warning

write-good.ThereIs = warning

proselint.Typography = suggestion

# Allows Microsoft.Adverbs to take precedence
proselint.Very = NO

proselint.Hyperbole = warning

# Allows Consensys.Spelling to take precedence
Vale.Spelling = NO

# MetaMask JSON-RPC API reference â€” technical / spec-shaped copy; skip normal doc-style rules.
[metamask-connect/evm/reference/json-rpc-api/**.{md,mdx}]
BasedOnStyles =

# Snaps API reference â€” generated from source; skip normal doc-style rules.
[snaps/reference/snaps-api/**.{md,mdx}]
BasedOnStyles =
