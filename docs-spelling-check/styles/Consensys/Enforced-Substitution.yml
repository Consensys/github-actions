# Enforced substitutions (CI fails on violation).

extends: substitution
message: Consider standard format, %s instead of "%s".
ignorecase: false
level: error
action:
  name: replace
swap:
  "Backend": "Back end"
  "backend": "backend"
  "DApp": "Dapp"
  "dApp": "dapp"
  "Frontend": "Front end"
  "frontend": "front end"
  "It is recommended": "We recommend"
  "It's recommended": "We recommend"
  "it is recommended": "we recommend"
  "it's recommended": "we recommend"
