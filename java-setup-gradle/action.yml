---
name: 'java-setup-gradle'
description: 'java-setup-gradle'

inputs:
  DISTRIBUTION:
    description: "jdk distribution to use"
    required: false
    default: 'temurin'

runs:
  using: "composite"
  steps:
    - name: Set up JDK 21
      uses: actions/setup-java@v5
      with:
        java-version: 21
        distribution: '${{ inputs.DISTRIBUTION }}'

    # v5.0.2
    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@0723195856401067f7a2779048b490ace7a47d7c

    - name: Cache Gradle dependencies
      uses: actions/cache@v5
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
        key: ${{ runner.os }}-gradle-${{ hashFiles('build.gradle') }}-${{ github.ref }}-${{ github.sha }}
        restore-keys: |
          ${{ runner.os }}-gradle-${{ hashFiles('build.gradle') }}-${{ github.ref }}-
          ${{ runner.os }}-gradle-${{ hashFiles('build.gradle') }}-
          ${{ runner.os }}-gradle-
