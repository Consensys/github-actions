---
name: 'Secure GitHub Binary Downloader'
description: 'Downloads a release binary from GitHub and verifies its SHA-256 checksum automatically.'
inputs:
  version:
    description: 'The version of the tool to download (e.g., 1.18.3)'
    required: true
  repo:
    description: 'The GitHub owner/repository (e.g., kurtosis-tech/kurtosis-cli-release-artifacts)'
    required: true
  tarball_name:
    description: 'The exact name of the asset file (e.g., kurtosis-cli_1.18.3_linux_amd64.tar.gz)'
    required: true
  binary_name:
    description: 'The name of the compiled binary inside the archive (e.g., kurtosis)'
    required: true

runs:
  using: "composite"
  steps:
    - name: Validate inputs
      shell: bash
      env:
        REPO: ${{ inputs.repo }}
        VERSION: ${{ inputs.version }}
        TARBALL_NAME: ${{ inputs.tarball_name }}
        BINARY_NAME: ${{ inputs.binary_name }}
      run: |
        if ! [[ "$REPO" =~ ^[A-Za-z0-9._-]+/[A-Za-z0-9._-]+$ ]]; then
          echo "::error::Invalid repo '$REPO'. Expected 'owner/repo' using alphanumeric, dash, dot, or underscore."
          exit 1
        fi
        if ! [[ "$VERSION" =~ ^v?[0-9]+[A-Za-z0-9._-]*$ ]]; then
          echo "::error::Invalid version '$VERSION'."
          exit 1
        fi
        if ! [[ "$TARBALL_NAME" =~ ^[A-Za-z0-9._-]+$ ]]; then
          echo "::error::Invalid tarball_name '$TARBALL_NAME'. Only alphanumeric, dash, dot, and underscore allowed."
          exit 1
        fi
        if ! [[ "$BINARY_NAME" =~ ^[A-Za-z0-9._-]+$ ]]; then
          echo "::error::Invalid binary_name '$BINARY_NAME'. Only alphanumeric, dash, dot, and underscore allowed."
          exit 1
        fi

    - name: Download Asset and Checksums
      shell: bash
      env:
        REPO: ${{ inputs.repo }}
        VERSION: ${{ inputs.version }}
        TARBALL_NAME: ${{ inputs.tarball_name }}
      run: |
        echo "Downloading $TARBALL_NAME from $REPO..."
        curl -fsSL -O "https://github.com/$REPO/releases/download/$VERSION/$TARBALL_NAME"
        curl -fsSL -O "https://github.com/$REPO/releases/download/$VERSION/checksums.txt"

    - name: Verify SHA-256 Checksum
      shell: bash
      env:
        TARBALL_NAME: ${{ inputs.tarball_name }}
      run: |
        echo "Verifying checksum..."
        grep "$TARBALL_NAME" checksums.txt | sha256sum --check

    - name: Extract and Install Binary
      shell: bash
      env:
        TARBALL_NAME: ${{ inputs.tarball_name }}
        BINARY_NAME: ${{ inputs.binary_name }}
      run: |
        tar -xvf "$TARBALL_NAME"
        sudo mv "$BINARY_NAME" /usr/local/bin/
        rm "$TARBALL_NAME" checksums.txt